aid: rbac
name: RBAC
description: >-
  Role-Based Access Control (RBAC) is a security paradigm that restricts system
  access based on assigned roles rather than individual user identities. Users
  are granted permissions through role membership, simplifying access management
  and ensuring the principle of least privilege. RBAC is foundational to
  enterprise identity, authorization, and compliance programs and is implemented
  across operating systems, cloud platforms, databases, and APIs. The NIST/ANSI/INCITS
  359-2004 standard formally defines the RBAC model across four components: Core RBAC,
  Hierarchical RBAC, Static Separation of Duty, and Dynamic Separation of Duty.
  Cloud platforms (AWS IAM, Azure RBAC, GCP IAM) and Kubernetes all implement RBAC
  natively, making it the de facto authorization standard for enterprise and cloud-native environments.
